name: Daily Code Pull Requests

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

env:
  COMMITS_PER_DAY: "7"

jobs:
  daily-prs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configurar identidade Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Gerar arquivos do dia
        run: python generate_daily.py

      - name: Abrir PRs e mesclar na main (um por snippet)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          DATE=$(date +%Y-%m-%d)
          DATE_US=$(date +%Y_%m_%d)
          N=${COMMITS_PER_DAY:-7}
          RID=${GITHUB_RUN_ID}
          ANY=0
          for i in $(seq 1 "$N"); do
            idx=$(printf '%03d' "$i")
            f="daily/${DATE_US}_${idx}.py"
            if [ ! -f "$f" ]; then
              echo "Arquivo esperado ausente: $f"
              exit 1
            fi
            git fetch origin main 2>/dev/null || true
            git checkout main
            git pull origin main --rebase=false || true
            BRANCH="daily/pr-${DATE_US}-${idx}-${RID}"
            git checkout -b "$BRANCH"
            git add "$f"
            if git diff --staged --quiet; then
              echo "Sem alteracoes em $f em relacao a main — pulando PR."
              git checkout main
              git branch -D "$BRANCH" 2>/dev/null || true
              continue
            fi
            git commit -m "daily: snippet do dia $DATE (#$i/$N)"
            git push -u origin "$BRANCH"
            PR_NUM=$(gh pr create --base main --head "$BRANCH" \
              --title "daily: snippet ${DATE} (#${i}/${N})" \
              --body "Snippet automático do dia \`${DATE}\` (parte ${i} de ${N})." \
              --json number -q .number)
            echo "PR #${PR_NUM} criado; mesclando na main..."
            gh pr merge "$PR_NUM" --merge --delete-branch
            ANY=1
            git checkout main
            git pull origin main --rebase=false || true
            git branch -D "$BRANCH" 2>/dev/null || true
          done
          if [ "$ANY" -eq 0 ]; then
            echo "Nenhum pull request novo (arquivos já iguais à main ou já processados)."
          fi

      - name: Resumo da execucao
        if: always()
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "## Daily PRs — ${DATE} (até ${COMMITS_PER_DAY}, criados e mesclados em \`main\`)" >> $GITHUB_STEP_SUMMARY
          echo "Cada PR foi aberto e mesclado com merge commit; branches remotos removidos quando aplicável." >> $GITHUB_STEP_SUMMARY
          echo "Histórico: https://github.com/${GITHUB_REPOSITORY}/commits/main" >> $GITHUB_STEP_SUMMARY
