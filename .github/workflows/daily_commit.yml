# 10 commits/dia (manhã 1–3, tarde 4–6, noite 7–10), 3 execuções agendadas.
# Cada execução: ramo → commits → PR → merge em main (fecha o PR).
# Preferência: PR com gh (GITHUB_TOKEN + Actions → permitir PRs, ou GH_CLI_USE_PAT=true + GH_PR_TOKEN).
# Se gh pr create falhar, o job tenta merge direto em BASE_BRANCH com git (só contents: write).
# Para proibir esse fallback (ex.: política interna): variable DAILY_DISABLE_GIT_MERGE_FALLBACK=true.
# Reexecutar um run antigo em Actions usa o workflow do commit desse run, não o main atual.
# Para testar o YAML novo: Actions → este workflow → "Run workflow" (ou push em main).
name: Daily Code Commits

on:
  schedule:
    # Manhã/tarde/noite em Brasília (UTC-3): GitHub Agenda só em UTC
    - cron: "0 11 * * *" # 08:00 BRT — manhã (slots 1–3)
    - cron: "0 17 * * *" # 14:00 BRT — tarde (slots 4–6)
    - cron: "0 23 * * *" # 20:00 BRT — noite (slots 7–10)
  workflow_dispatch:
    inputs:
      slot:
        description: "Período a gerar; auto = inferir pela hora UTC (agendamento) ou manhã se ambíguo"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - morning
          - afternoon
          - evening

env:
  COMMITS_PER_DAY: "10"

jobs:
  daily-commits:
    runs-on: ubuntu-latest
    # Evita dois runs a fundirem em paralelo e a criarem conflitos na mesma base.
    concurrency:
      group: daily-commits-${{ github.workflow }}-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
    env:
      # Agendado: ref por defeito do repo; dispatch: branch escolhida na UI.
      BASE_BRANCH: ${{ github.ref_name }}

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configurar identidade Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Definir período (manhã / tarde / noite)
        run: |
          set -e
          MANUAL="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.slot || 'auto' }}"
          if [ "$MANUAL" != "auto" ]; then
            echo "COMMIT_SLOT=$MANUAL" >> "$GITHUB_ENV"
            echo "Período (manual): $MANUAL"
            exit 0
          fi
          HOUR=$(date -u +%H)
          case "$HOUR" in
            11) SLOT=morning ;;
            17) SLOT=afternoon ;;
            23) SLOT=evening ;;
            *)
              echo "::warning::Hora UTC $HOUR sem mapeamento; a usar manhã (morning)."
              SLOT=morning
              ;;
          esac
          echo "COMMIT_SLOT=$SLOT" >> "$GITHUB_ENV"
          echo "Período (UTC ${HOUR}): $SLOT"

      - name: Atualizar base e criar ramo do PR
        run: |
          set -e
          DATE_US=$(date +%Y_%m_%d)
          git fetch origin "$BASE_BRANCH"
          git checkout "$BASE_BRANCH"
          git pull origin "$BASE_BRANCH" --rebase=false || true
          # GITHUB_RUN_ATTEMPT incrementa em cada reexecução do mesmo run (evita push non-fast-forward).
          BRANCH="bot/daily-${DATE_US}-${COMMIT_SLOT}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git checkout -b "$BRANCH"
          echo "PR_BRANCH=$BRANCH" >> "$GITHUB_ENV"
          echo "Ramo do PR: $BRANCH (base: $BASE_BRANCH)"

      - name: Gerar arquivos do dia
        run: python generate_daily.py --slot "$COMMIT_SLOT"

      - name: Commits no ramo, PR e merge em main
        env:
          # Só usa PAT se GH_CLI_USE_PAT=true (repo variable); senão GITHUB_TOKEN (evita PAT mal configurado a sombrear o token da Action).
          GH_TOKEN: ${{ vars.GH_CLI_USE_PAT == 'true' && secrets.GH_PR_TOKEN || secrets.GITHUB_TOKEN }}
          GH_PROMPT_DISABLED: "1"
          DAILY_DISABLE_GIT_MERGE_FALLBACK: ${{ vars.DAILY_DISABLE_GIT_MERGE_FALLBACK }}
        run: |
          set -e
          DATE=$(date +%Y-%m-%d)
          DATE_US=$(date +%Y_%m_%d)
          BRANCH="${PR_BRANCH}"
          case "${COMMIT_SLOT}" in
            morning) INDICES="1 2 3" ;;
            afternoon) INDICES="4 5 6" ;;
            evening) INDICES="7 8 9 10" ;;
            *)
              echo "COMMIT_SLOT inválido: ${COMMIT_SLOT:-vazio}"
              exit 1
              ;;
          esac
          TOTAL_DAY=${COMMITS_PER_DAY:-10}
          COMMITS=0
          SKIPPED=0
          for i in $INDICES; do
            idx=$(printf '%03d' "$i")
            f="daily/${DATE_US}_${idx}.py"
            if [ ! -f "$f" ]; then
              echo "Arquivo esperado ausente: $f"
              exit 1
            fi
            git add "$f"
            if git diff --staged --quiet; then
              echo "SKIP [$i/$TOTAL_DAY] $f — sem alterações em relação ao ramo atual."
              SKIPPED=$((SKIPPED + 1))
              continue
            fi
            git commit -m "daily: snippet do dia $DATE (#$i/$TOTAL_DAY, ${COMMIT_SLOT})"
            COMMITS=$((COMMITS + 1))
          done
          echo "COMMITS_PUSHED=$COMMITS" >> "$GITHUB_ENV"
          echo "SLOTS_SKIPPED=$SKIPPED" >> "$GITHUB_ENV"
          echo "---- Resumo: commits no ramo=$COMMITS | slots pulados=$SKIPPED ----"
          if [ "$COMMITS" -eq 0 ]; then
            echo "::warning::Nenhum commit novo; não abre PR."
            exit 0
          fi
          git push -u origin "$BRANCH"
          TITLE="daily: ${DATE} (${COMMIT_SLOT}, commits $(echo $INDICES | tr ' ' ','))"
          BODY="Commits automáticos **#${TOTAL_DAY}** do dia (${COMMIT_SLOT}). Fecha após merge em \`${BASE_BRANCH}\`."
          if gh pr create --base "$BASE_BRANCH" --head "$BRANCH" --title "$TITLE" --body "$BODY"; then
            if gh pr merge --merge --delete-branch; then
              echo "PR fundido com merge commit."
            elif gh pr merge --squash --delete-branch; then
              echo "PR fundido com squash (merge commits desativados no repo)."
            elif gh pr merge --rebase --delete-branch; then
              echo "PR fundido com rebase."
            else
              echo "::error::PR criado mas gh pr merge falhou. Confira tipos de merge e branch rules em \`${BASE_BRANCH}\`."
              exit 1
            fi
          else
            if [ "${DAILY_DISABLE_GIT_MERGE_FALLBACK:-}" = "true" ]; then
              echo "::error::gh pr create falhou e o fallback git está desativado (DAILY_DISABLE_GIT_MERGE_FALLBACK=true). Ajuste permissões/PAT ou remova essa variable."
              exit 1
            fi
            echo "::notice::gh pr create falhou (API/token); a integrar em \`${BASE_BRANCH}\` com merge local (sem PR)."
            git checkout "$BASE_BRANCH"
            git pull origin "$BASE_BRANCH" --rebase=false || true
            if ! git merge "$BRANCH" --no-ff -m "daily: merge ${BRANCH} (${COMMIT_SLOT})"; then
              echo "::error::git merge falhou (conflitos com \`${BASE_BRANCH}\`?)."
              exit 1
            fi
            if ! git push origin "$BASE_BRANCH"; then
              echo "::error::git push de \`${BASE_BRANCH}\` falhou (branch protegida ou falta de permissão contents: write?)."
              exit 1
            fi
            git push origin --delete "$BRANCH" || true
            echo "Integrado em \`${BASE_BRANCH}\` via merge local."
          fi

      - name: Resumo da execucao
        if: always()
        run: |
          DATE=$(date +%Y-%m-%d)
          C="${COMMITS_PUSHED:-—}"
          S="${SLOTS_SKIPPED:-—}"
          SLOT="${COMMIT_SLOT:-—}"
          echo "## Daily commits — ${DATE} (${SLOT})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Período | **${SLOT}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Commits no PR | **${C}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Slots ignorados (sem diff) | **${S}** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Historico: https://github.com/${GITHUB_REPOSITORY}/commits/${BASE_BRANCH}" >> $GITHUB_STEP_SUMMARY
