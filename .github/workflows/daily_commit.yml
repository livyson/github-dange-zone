name: Daily Code Pull Requests

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

env:
  COMMITS_PER_DAY: "7"

jobs:
  daily-prs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configurar identidade Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Gerar arquivos do dia
        run: python generate_daily.py

      - name: Abrir PRs e mesclar na main (um por snippet)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          DATE=$(date +%Y-%m-%d)
          DATE_US=$(date +%Y_%m_%d)
          N=${COMMITS_PER_DAY:-7}
          RID=${GITHUB_RUN_ID}
          CREATED=0
          SKIPPED=0
          for i in $(seq 1 "$N"); do
            idx=$(printf '%03d' "$i")
            f="daily/${DATE_US}_${idx}.py"
            if [ ! -f "$f" ]; then
              echo "Arquivo esperado ausente: $f"
              exit 1
            fi
            git fetch origin main 2>/dev/null || true
            git checkout main
            git pull origin main --rebase=false || true
            BRANCH="daily/pr-${DATE_US}-${idx}-${RID}"
            git checkout -b "$BRANCH"
            git add "$f"
            if git diff --staged --quiet; then
              echo "SKIP [$i/$N] $f — sem diff em relacao a main (nao abre PR)."
              SKIPPED=$((SKIPPED + 1))
              git checkout main
              git branch -D "$BRANCH" 2>/dev/null || true
              continue
            fi
            git commit -m "daily: snippet do dia $DATE (#$i/$N)"
            git push -u origin "$BRANCH"
            PR_NUM=$(gh pr create --base main --head "$BRANCH" \
              --title "daily: snippet ${DATE} (#${i}/${N})" \
              --body "Snippet automático do dia \`${DATE}\` (parte ${i} de ${N})." \
              --json number -q .number)
            echo "OK [$i/$N] PR #${PR_NUM} criado; mesclando na main..."
            gh pr merge "$PR_NUM" --merge --delete-branch
            CREATED=$((CREATED + 1))
            git checkout main
            git pull origin main --rebase=false || true
            git branch -D "$BRANCH" 2>/dev/null || true
          done
          echo "PRS_CREATED=$CREATED" >> "$GITHUB_ENV"
          echo "PRS_SKIPPED=$SKIPPED" >> "$GITHUB_ENV"
          echo "---- Resumo: PRs mesclados=$CREATED | slots pulados=$SKIPPED (ja iguais a main) ----"
          if [ "$CREATED" -eq 0 ] && [ "$SKIPPED" -gt 0 ]; then
            echo "::warning::Nenhum PR foi aberto: os $SKIPPED arquivo(s) do dia ja estavam na main com o mesmo conteudo. A aba Pull requests so mostra PRs que chegaram a ser criados."
          fi

      - name: Resumo da execucao
        if: always()
        run: |
          DATE=$(date +%Y-%m-%d)
          C="${PRS_CREATED:-—}"
          S="${PRS_SKIPPED:-—}"
          echo "## Daily PRs — ${DATE}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| PRs criados e mesclados | **${C}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Slots ignorados (sem diff vs \`main\`) | **${S}** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Se **PRs mesclados = 0** e **ignorados = 7**, o job correu mas nada mudou em relação à \`main\` — por isso não há PRs na lista." >> $GITHUB_STEP_SUMMARY
          echo "Commits na \`main\`: https://github.com/${GITHUB_REPOSITORY}/commits/main" >> $GITHUB_STEP_SUMMARY
